<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tania Enterprise</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fa;
}

/* HERO */
.hero {
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
  url('https://i.ibb.co/F4y4vcn0/32-B77-D17-AEB4-4123-9863-685-A000228-F4.png');
  background-size: cover;
  color: white;
  text-align: center;
  padding: 120px 20px;
  animation: fadeIn 2s;
}

.hero h1 {
  font-size: 36px;
}

/* BUTTON */
.btn {
  padding: 10px 20px;
  margin: 5px;
  background: #007bff;
  color: white;
  border-radius: 5px;
  text-decoration: none;
}

/* SECTION */
.section {
  padding: 40px 20px;
  text-align: center;
}

/* PRODUCTS */
.products {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.product {
  background: white;
  margin: 15px;
  padding: 15px;
  border-radius: 10px;
  width: 250px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.product:hover {
  transform: translateY(-10px);
}

.product img {
  width: 100%;
  border-radius: 10px;
}

/* PRICE LIST */
.price {
  color: green;
  font-weight: bold;
}

/* FORM */
form {
  max-width: 400px;
  margin: auto;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

/* STICKY */
.sticky {
  position: fixed;
  bottom: 20px;
  right: 20px;
}

.call { background: blue; }
.whatsapp { background: green; }

/* ANIMATION */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Tania Enterprise</h1>
  <p>সিমেন্ট, রড, ইট, বালি সুলভ মূল্যে পাওয়া যায়</p>
  <a class="btn" href="https://wa.me/919123991412">💬 যোগাযোগ করুন</a>
</section>

<!-- PRODUCTS -->
<section class="section">
<h2>আমাদের পণ্য</h2>

<div class="products">

<div class="product">
<img src="https://i.ibb.co/rGwQrrXQ/IMG-4770.jpg">
<p>ইট (Bricks)</p>
<p class="price">₹8 / piece</p>
<a class="btn" href="https://wa.me/919123991412?text=I want bricks">🛒 Add</a>
</div>

<div class="product">
<img src="https://i.ibb.co/HDcNsCCJ/IMG-4771.jpg">
<p>বালি (Sand)</p>
<p class="price">₹1200 / truck</p>
<a class="btn" href="https://wa.me/919123991412?text=I want sand">🛒 Add</a>
</div>

<div class="product">
<img src="https://i.ibb.co/YFvjX8rd/IMG-4772.jpg">
<p>সিমেন্ট (Cement)</p>
<p class="price">₹380 / bag</p>
<a class="btn" href="https://wa.me/919123991412?text=I want cement">🛒 Add</a>
</div>

<div class="product">
<img src="https://i.ibb.co/tTDXG2LB/IMG-4768.jpg">
<p>রড (Rod)</p>
<p class="price">₹65 / kg</p>
<a class="btn" href="https://wa.me/919123991412?text=I want rod">🛒 Add</a>
</div>

</div>
</section>

<!-- BULK ORDER FORM -->
<section class="section">
<h2>Bulk Order Form / বাল্ক অর্ডার</h2>

<form onsubmit="sendOrder(); return false;">
<input type="text" id="name" placeholder="আপনার নাম" required>
<input type="text" id="phone" placeholder="মোবাইল নম্বর" required>

<select id="product">
<option>ইট</option>
<option>বালি</option>
<option>সিমেন্ট</option>
<option>রড</option>
</select>

<input type="number" id="qty" placeholder="পরিমাণ (Quantity)" required>

<button class="btn">Submit Order</button>
</form>
</section>

<!-- CONTACT -->
<section class="section">
<h2>যোগাযোগ করুন</h2>
<p>📞 9123991412</p>
</section>

<!-- STICKY -->
<div class="sticky">
<a class="btn call" href="tel:9123991412">📞</a><br>
<a class="btn whatsapp" href="https://wa.me/919123991412">💬</a>
</div>

<script>
function sendOrder() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let product = document.getElementById("product").value;
  let qty = document.getElementById("qty").value;

  let msg = `নাম: ${name}%0Aমোবাইল: ${phone}%0Aপণ্য: ${product}%0Aপরিমাণ: ${qty}`;

  window.open(`https://wa.me/919123991412?text=${msg}`);
}
</script>

</body>
</html>
